services:
  - type: web
    name: photos-mgmt-system-api
    runtime: node
    plan: free
    buildCommand: npm ci && npm run build
    startCommand: npm run dev:server
    healthCheckPath: /api/health
    disk:
      name: photos-data
      mountPath: /var/data
      sizeGB: 10
    envVars:
      - key: HOST
        value: 0.0.0.0
      - key: DATA_DIR
        value: /var/data
      - key: R2_ACCOUNT_ID
        sync: false
      - key: R2_ACCESS_KEY_ID
        sync: false
      - key: R2_SECRET_ACCESS_KEY
        sync: false
      - key: R2_BUCKET_NAME
        sync: false
      - key: MIGRATION_TOKEN
        sync: false
      - key: ADMIN_EMAILS
        sync: false
      - key: ALLOWED_ORIGINS
        value: https://gallery.sanghak.kr,https://sanghakbae.github.io
