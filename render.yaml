services:
  - type: web
    name: photos-mgmt-system-api
    runtime: node
    plan: free
    buildCommand: npm ci
    startCommand: npm run dev:server
    healthCheckPath: /api/health
    disk:
      name: photos-data
      mountPath: /var/data
      sizeGB: 10
    envVars:
      - key: HOST
        value: 0.0.0.0
      - key: DATA_DIR
        value: /var/data
      - key: MIGRATION_TOKEN
        sync: false
      - key: ADMIN_EMAILS
        sync: false
      - key: ALLOWED_ORIGINS
        value: https://sanghakbae.github.io
